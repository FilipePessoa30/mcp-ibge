[project]
name = "mcp-ibge"
version = "0.3.0"
description = "MCP server for official Brazilian IBGE public data: locations, SIDRA statistical aggregates, population estimates and geospatial boundaries, with typed and source-cited responses."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "mcp-ibge contributors" }]
keywords = [
    "mcp",
    "model-context-protocol",
    "ibge",
    "sidra",
    "dados-abertos",
    "open-data",
    "brasil",
    "brazil",
    "geospatial",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Internet :: WWW/HTTP :: Indexing/Search",
    "Typing :: Typed",
]
dependencies = [
    "mcp[cli]>=1.6.0",
    "httpx>=0.27",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "typer>=0.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "ruff>=0.6",
    "mypy>=1.10",
]

[project.urls]
Homepage = "https://github.com/FilipePessoa30/mcp-data-br/tree/main/packages/mcp_ibge"
Documentation = "https://FilipePessoa30.github.io/mcp-data-br/"
Repository = "https://github.com/FilipePessoa30/mcp-data-br"
Issues = "https://github.com/FilipePessoa30/mcp-data-br/issues"
Changelog = "https://github.com/FilipePessoa30/mcp-data-br/blob/main/CHANGELOG.md"

[project.scripts]
mcp-ibge = "mcp_ibge.server:main"
mcp-data-br = "mcp_ibge.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_ibge"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF", "PT"]
ignore = ["B008"]

[tool.ruff.lint.isort]
known-first-party = ["mcp_ibge"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
files = ["src"]
ignore_missing_imports = true
check_untyped_defs = true
