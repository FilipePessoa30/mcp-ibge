name: "\U0001F41B Bug report"
description: Report a problem with one of the mcp-data-br servers or tools.
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much
        detail as possible — see [CONTRIBUTING.md](https://github.com/FilipePessoa30/mcp-data-br/blob/main/CONTRIBUTING.md)
        for how to run the project locally.
  - type: input
    id: module
    attributes:
      label: Affected module/package
      description: e.g. `mcp-ibge`
      placeholder: mcp-ibge
    validations:
      required: true
  - type: input
    id: tool
    attributes:
      label: Affected tool (if applicable)
      placeholder: consultar_agregado
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The tool call(s) and arguments used, ideally as a Python snippet or JSON.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / response envelope
      description: |
        Paste the full response envelope if available
        (`{"ok": ..., "data": ..., "metadata": ..., "warnings": ..., "errors": ...}`).
      render: json
  - type: input
    id: version
    attributes:
      label: mcp-ibge version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: MCP client
      options:
        - Claude Desktop
        - Cursor
        - Open WebUI (mcpo)
        - Other / direct stdio
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, uv version.
      value: |
        - OS:
        - Python version:
        - uv version:
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, screenshots, links to related issues, etc.
