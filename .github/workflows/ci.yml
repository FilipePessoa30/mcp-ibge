name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check packages/mcp_ibge

      - name: Format check (ruff format)
        run: uv run ruff format --check packages/mcp_ibge

      - name: Type check (mypy, opcional)
        run: uv run --directory packages/mcp_ibge mypy
        continue-on-error: true

      - name: Tests (pytest)
        run: uv run --directory packages/mcp_ibge pytest -q
